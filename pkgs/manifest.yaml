  - {manager: brew, name: rustup, description: "Instalador da toolchain Rust"}
  - {manager: brew, name: python@3.13, description: "Interpretador Python 3.13"}
  - {manager: brew, name: nvm, description: "Gerencia múltiplas versões do Node.js"}
  - {manager: paru, name: jdk-openjdk, description: "Kit de desenvolvimento Java OpenJDK 26"}
  - {manager: paru, name: ruby, description: "Linguagem dinâmica orientada a objetos"}
  - {manager: paru, name: lldb, description: "Debugger de alta performance da família LLVM"}
  - {manager: brew, name: pipx, description: "Executa binários de pacotes Python em ambientes isolados"}
