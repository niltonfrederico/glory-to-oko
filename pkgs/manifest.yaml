  - {manager: brew, name: miller, description: "sed/awk/cut/join/sort para dados indexados por nome (CSV)"}
  - {manager: paru, name: 7zip, description: "Compactador de arquivos com alta taxa de compressão"}
  - {manager: paru, name: rsync, description: "Cópia rápida e versátil de arquivos locais/remotos"}
  - {manager: brew, name: qpdf, description: "Ferramentas de inspeção e transformação de PDFs"}
  - {manager: brew, name: ddgr, description: "DuckDuckGo direto do terminal"}
  - {manager: brew, name: s-search, description: "Busca web via shortcuts no terminal"}
