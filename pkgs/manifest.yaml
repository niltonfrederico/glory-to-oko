  - {manager: paru, name: chromium, description: "Navegador web focado em velocidade e segurança"}
  - {manager: paru, name: google-chrome, description: "Navegador Google Chrome (canal stable)"}
  - {manager: paru, name: discord, description: "Chat de voz e texto para gamers"}
  - {manager: paru, name: slack-desktop, description: "Cliente Slack desktop (beta) para Linux"}
  - {manager: paru, name: proton-mail-bin, description: "App desktop oficial do Proton Mail e Proton Calendar"}
