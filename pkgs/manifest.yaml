version: 1
packages:
  # --- sistema base e Garuda ---
  - {manager: paru, name: base-devel, description: "Ferramentas base para compilar pacotes do Arch"}
  - {manager: paru, name: performance-tweaks, description: "Ajustes de performance do Garuda"}
  - {manager: paru, name: linux-headers, description: "Headers do kernel para compilar módulos"}
  - {manager: paru, name: v4l2loopback-dkms, description: "Módulo v4l2-loopback (câmera virtual) via DKMS"}
  - {manager: paru, name: fwupd, description: "Daemon de atualização de firmware via LVFS"}
  - {manager: paru, name: rate-mirrors, description: "Ranqueia mirrors do Arch por latência e proximidade"}
  - {manager: paru, name: garuda-mokka, description: "Tema Mokka e presets de desktop do Garuda"}
  - {manager: paru, name: garuda-toolbox, description: "Coleção de ferramentas para gerenciar o Garuda Linux"}
  # --- KDE / desktop ---
  - {manager: paru, name: kwin-effect-rounded-corners-git, description: "Cantos arredondados em janelas no KWin Wayland"}
  - {manager: paru, name: kwin-effects-better-blur-dx, description: "Fork do efeito blur do KWin com força por classe de janela"}
  - {manager: paru, name: ark, description: "Gerenciador de arquivos compactados do KDE"}
  - {manager: paru, name: dolphin, description: "Gerenciador de arquivos do KDE"}
  - {manager: paru, name: kate, description: "Editor de texto avançado do KDE"}
