  - {manager: brew, name: opentofu, description: "Substituto open source do Terraform (IaC)"}
  - {manager: brew, name: tflint, description: "Linter para arquivos Terraform"}
  - {manager: brew, name: oci-cli, description: "CLI da Oracle Cloud Infrastructure"}
  - {manager: brew, name: steipete/tap/gogcli, description: "CLI para serviços Google (Gmail, Drive, Docs, Sheets)"}
  # --- servidores web e DNS ---
  - {manager: brew, name: caddy, description: "Servidor web com HTTPS automático"}
  - {manager: brew, name: nginx, description: "Servidor HTTP(S) e proxy reverso"}
  - {manager: brew, name: dnsmasq, description: "Forwarder DNS leve com servidor DHCP"}
