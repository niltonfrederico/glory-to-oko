  - {manager: brew, name: kubernetes-cli, description: "CLI do Kubernetes (kubectl)"}
  - {manager: brew, name: kubectx, description: "Troca rápida entre contextos kubectl"}
  - {manager: brew, name: k9s, description: "TUI para gerenciar clusters Kubernetes"}
  - {manager: brew, name: k3d, description: "Roda k3s (CNCF) dentro do Docker"}
  - {manager: brew, name: helm, description: "Gerenciador de pacotes do Kubernetes"}
