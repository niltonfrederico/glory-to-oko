  - {manager: paru, name: docker, description: "Empacota, distribui e executa apps em containers"}
  - {manager: paru, name: docker-compose, description: "Orquestra ambientes Docker isolados"}
  - {manager: paru, name: docker-buildx, description: "Plugin CLI do Docker para builds com BuildKit"}
  - {manager: paru, name: docker-rootless-extras, description: "Extras para rodar Docker sem root"}
  - {manager: paru, name: slirp4netns, description: "Networking user-mode para namespaces sem privilégio"}
  - {manager: paru, name: fuse-overlayfs, description: "Implementação FUSE do overlayfs"}
  - {manager: brew, name: docker-credential-helper, description: "Helper de credenciais do Docker via keystore do SO"}
