  - {manager: paru, name: opensnitch, description: "Firewall por aplicação para Linux"}
  - {manager: paru, name: nmap, description: "Scanner de rede e auditoria de segurança"}
  - {manager: brew, name: arp-scan, description: "Scanner ARP e fingerprinting de rede"}
  - {manager: paru, name: bluez-utils, description: "Utilitários de desenvolvimento e debug do stack Bluetooth"}
